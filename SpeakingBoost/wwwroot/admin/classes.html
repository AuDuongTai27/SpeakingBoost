<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Lớp học - SpeakingBoost</title>
    <meta name="description" content="Quản lý lớp học — SpeakingBoost Admin">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/admin-layout.css" rel="stylesheet">
</head>
<body>

<div id="pageLoader"><div class="logo-spin"><i class="bi bi-mic-fill"></i></div><p>Đang xác thực...</p></div>
<div id="sidebarPlaceholder"></div>
<div id="topbarPlaceholder"></div>

<main id="main">
  <div class="page-content">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="page-title">Quản lý Lớp học</h1>
        <p class="text-muted mb-0" style="font-size:.85rem;">Tạo lớp và thêm học sinh — nhấp đúp tên để đổi tên lớp</p>
      </div>
      <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#modalClass" onclick="openCreate()">
        <i class="bi bi-plus-circle-fill me-2"></i>Tạo lớp mới
      </button>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-sm-6">
        <div class="card-panel p-4 text-center">
          <div style="font-size:2rem;font-weight:700;color:#6366f1;" id="statClasses">--</div>
          <div class="text-muted" style="font-size:.82rem;">Lớp học</div>
        </div>
      </div>
      <div class="col-sm-6">
        <div class="card-panel p-4 text-center">
          <div style="font-size:2rem;font-weight:700;color:#0284c7;" id="statStudents">--</div>
          <div class="text-muted" style="font-size:.82rem;">Tổng học sinh</div>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="card-panel p-0 overflow-hidden">
      <div class="p-3 border-bottom d-flex gap-2 align-items-center">
        <i class="bi bi-search text-muted"></i>
        <input type="text" id="searchInput" class="form-control border-0 shadow-none p-0"
               placeholder="Tìm lớp học..." style="outline:none;">
      </div>
      <table class="table table-hover mb-0">
        <thead class="table-head">
          <tr>
            <th>Tên lớp <small class="text-muted fw-normal">(đúp để đổi tên)</small></th>
            <th>Sĩ số</th>
            <th class="text-center">Chi tiết</th>
          </tr>
        </thead>
        <tbody id="classesBody">
          <tr><td colspan="3" class="text-center py-4 text-muted">
            <div class="spinner-border spinner-border-sm me-2"></div>Đang tải...
          </td></tr>
        </tbody>
      </table>
      <!-- Pagination -->
      <div class="pagination-wrap" id="pgWrap">
        <span class="pagination-info" id="pgInfo"></span>
      </div>
    </div>

  </div>
</main>

<!-- Modal Tạo lớp -->
<div class="modal fade" id="modalClass" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content admin-modal">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalClassTitle">Tạo lớp mới</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="classId">
        <div class="mb-3">
          <label class="form-label fw-500">Tên lớp <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="className" placeholder="VD: IELTS Speaking A1">
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-primary rounded-pill px-4" onclick="saveClass()">
          <i class="bi bi-check-lg me-1"></i>Lưu
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/pagination.js"></script>
<script src="/js/admin/classes.js"></script>
</body>
</html>
