<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Người dùng - SpeakingBoost</title>
    <meta name="description" content="Quản lý tài khoản người dùng — SpeakingBoost Admin">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/admin-layout.css" rel="stylesheet">
</head>
<body>
<div id="pageLoader"><div class="logo-spin"><i class="bi bi-mic-fill"></i></div><p>Đang xác thực...</p></div>
<div id="sidebarPlaceholder"></div>
<div id="topbarPlaceholder"></div>

<main id="main">
  <div class="page-content">

    <!-- Header row -->
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="page-title">Quản lý Người dùng</h1>
        <p class="text-muted mb-0" style="font-size:.85rem;">Tạo, chỉnh sửa và xóa tài khoản trong hệ thống</p>
      </div>
      <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#modalUser" onclick="openCreateUser()">
        <i class="bi bi-person-plus-fill me-2"></i>Thêm người dùng
      </button>
    </div>

    <!-- Search -->
    <div class="card-panel mb-3 p-3 d-flex gap-2 align-items-center">
      <i class="bi bi-search text-muted"></i>
      <input type="text" id="searchInput" class="form-control border-0 shadow-none p-0" placeholder="Tìm theo tên, email..." oninput="filterTable()" style="outline:none;">
      <select id="roleFilter" class="form-select form-select-sm w-auto border-0" onchange="filterTable()">
        <option value="">Tất cả vai trò</option>
        <option value="student">Học sinh</option>
        <option value="teacher">Giáo viên</option>
        <option value="superadmin">Super Admin</option>
      </select>
    </div>

    <!-- Table -->
    <div class="card-panel p-0 overflow-hidden">
      <table class="table table-hover mb-0" id="usersTable">
        <thead class="table-head">
          <tr>
            <th>Họ tên</th><th>Email</th><th>Vai trò</th><th>Ngày tạo</th><th class="text-center">Hành động</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="5" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Đang tải...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal Tạo/Sửa User -->
<div class="modal fade" id="modalUser" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content admin-modal">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalUserTitle">Thêm người dùng</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="userId">
        <div class="mb-3">
          <label class="form-label fw-500">Họ tên <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="userFullName" placeholder="Nguyễn Văn A">
        </div>
        <div class="mb-3">
          <label class="form-label fw-500">Email <span class="text-danger">*</span></label>
          <input type="email" class="form-control" id="userEmail" placeholder="user@email.com">
        </div>
        <div class="mb-3">
          <label class="form-label fw-500">Vai trò <span class="text-danger">*</span></label>
          <select class="form-select" id="userRole">
            <option value="Student">Học sinh</option>
            <option value="Teacher">Giáo viên</option>
            <option value="SuperAdmin">Super Admin</option>
          </select>
        </div>
        <div id="pwSection">
          <div class="mb-3">
            <label class="form-label fw-500">Mật khẩu <span class="text-danger">*</span></label>
            <input type="password" class="form-control" id="userPassword" placeholder="Tối thiểu 6 ký tự">
          </div>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-primary rounded-pill px-4" id="btnSaveUser" onclick="saveUser()">
          <i class="bi bi-check-lg me-1"></i>Lưu
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script>
  initAdminPage('nav-users', 'Quản lý Người dùng');

  let allUsers = [];

  // ── Load users ─────────────────────────────────────────────────────
  async function loadUsers() {
    const res = await Api.get('/api/admin/users');
    if (!res.success) { Toast.err('Lỗi tải dữ liệu!'); return; }
    allUsers = res.data;
    renderTable(allUsers);
  }

  function renderTable(users) {
    const tbody = document.getElementById('usersBody');
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">Không có dữ liệu</td></tr>'; return; }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td><div class="d-flex align-items-center gap-2">
          <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#06b6d4);
            display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:600;flex-shrink:0;">
            ${(u.fullName||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}
          </div>
          <span class="fw-500">${u.fullName}</span>
        </div></td>
        <td class="text-muted">${u.email}</td>
        <td>${roleBadge(u.role)}</td>
        <td class="text-muted">${fmtDate(u.createdAt)}</td>
        <td class="text-center">
          <button class="btn btn-sm btn-light rounded-pill me-1" onclick="openEditUser(${u.userId})" title="Sửa">
            <i class="bi bi-pencil-fill text-primary"></i>
          </button>
          <button class="btn btn-sm btn-light rounded-pill" onclick="deleteUser(${u.userId},'${u.fullName}')" title="Xóa">
            <i class="bi bi-trash-fill text-danger"></i>
          </button>
        </td>
      </tr>`).join('');
  }

  function filterTable() {
    const q    = document.getElementById('searchInput').value.toLowerCase();
    const role = document.getElementById('roleFilter').value.toLowerCase();
    renderTable(allUsers.filter(u =>
      (!q || u.fullName.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)) &&
      (!role || u.role.toLowerCase() === role)
    ));
  }

  // ── Create ──────────────────────────────────────────────────────────
  function openCreateUser() {
    document.getElementById('modalUserTitle').textContent = 'Thêm người dùng';
    document.getElementById('userId').value = '';
    document.getElementById('userFullName').value = '';
    document.getElementById('userEmail').value = '';
    document.getElementById('userRole').value = 'Student';
    document.getElementById('userPassword').value = '';
    document.getElementById('pwSection').style.display = '';
  }

  function openEditUser(id) {
    const u = allUsers.find(x => x.userId === id);
    if (!u) return;
    document.getElementById('modalUserTitle').textContent = 'Chỉnh sửa người dùng';
    document.getElementById('userId').value = u.userId;
    document.getElementById('userFullName').value = u.fullName;
    document.getElementById('userEmail').value = u.email;
    document.getElementById('userRole').value = u.role;
    document.getElementById('pwSection').style.display = 'none';
    new bootstrap.Modal(document.getElementById('modalUser')).show();
  }

  async function saveUser() {
    const id       = document.getElementById('userId').value;
    const fullName = document.getElementById('userFullName').value.trim();
    const email    = document.getElementById('userEmail').value.trim();
    const role     = document.getElementById('userRole').value;
    const password = document.getElementById('userPassword').value;

    if (!fullName || !email || !role) { Toast.err('Vui lòng điền đầy đủ thông tin.'); return; }

    const btn = document.getElementById('btnSaveUser');
    btn.disabled = true;

    let res;
    if (id) {
      res = await Api.put(`/api/admin/users/${id}`, { fullName, email, role });
    } else {
      if (!password) { Toast.err('Vui lòng nhập mật khẩu.'); btn.disabled = false; return; }
      res = await Api.post('/api/admin/users', { fullName, email, role, password });
    }

    btn.disabled = false;
    if (res.success) {
      Toast.ok(id ? 'Cập nhật thành công!' : 'Tạo người dùng thành công!');
      bootstrap.Modal.getInstance(document.getElementById('modalUser'))?.hide();
      loadUsers();
    } else {
      Toast.err(res.message || 'Lỗi! Vui lòng thử lại.');
    }
  }

  async function deleteUser(id, name) {
    if (!await adminConfirm(`Xóa người dùng "${name}"? Hành động này không thể hoàn tác.`)) return;
    const res = await Api.del(`/api/admin/users/${id}`);
    if (res.success) { Toast.ok('Đã xóa người dùng!'); loadUsers(); }
    else Toast.err(res.message || 'Xóa thất bại.');
  }

  AuthGuard.onReady(() => loadUsers());
</script>
</body>
</html>
