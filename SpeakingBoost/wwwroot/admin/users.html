<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Học sinh - SpeakingBoost</title>
    <meta name="description" content="Quản lý tài khoản học sinh — SpeakingBoost Admin">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/admin-layout.css" rel="stylesheet">
</head>
<body>

    <div id="pageLoader"><div class="logo-spin"><i class="bi bi-mic-fill"></i></div><p>Đang xác thực...</p></div>
    <div id="sidebarPlaceholder"></div>
    <div id="topbarPlaceholder"></div>

    <main id="main">
        <div class="page-content">

            <!-- Header -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h1 class="page-title">Quản lý Học sinh</h1>
                    <p class="text-muted mb-0" style="font-size:.85rem;">Tạo, chỉnh sửa và quản lý tài khoản học sinh trong hệ thống</p>
                </div>
                <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#modalUser" onclick="openCreateUser()">
                    <i class="bi bi-person-plus-fill me-2"></i>Thêm học sinh
                </button>
            </div>

            <!-- Filter bar -->
            <div class="card-panel mb-3 p-3 d-flex gap-2 align-items-center">
                <i class="bi bi-search text-muted"></i>
                <input type="text" id="searchInput" class="form-control border-0 shadow-none p-0"
                       placeholder="Tìm theo tên, email..." style="outline:none;">
            </div>

            <!-- Table -->
            <div class="card-panel p-0 overflow-hidden">
                <table class="table table-hover mb-0" id="usersTable">
                    <thead class="table-head">
                        <tr>
                            <th>Họ tên</th>
                            <th>Email</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr>
                            <td colspan="3" class="text-center py-4 text-muted">
                                <div class="spinner-border spinner-border-sm me-2"></div>Đang tải...
                            </td>
                        </tr>
                    </tbody>
                </table>
                <!-- Pagination -->
                <div class="pagination-wrap" id="pgWrap">
                    <span class="pagination-info" id="pgInfo"></span>
                </div>
            </div>

        </div>
    </main>

    <!-- Modal Tạo/Sửa User -->
    <div class="modal fade" id="modalUser" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content admin-modal">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="modalUserTitle">Thêm học sinh</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="userId">
                    <div class="mb-3">
                        <label class="form-label fw-500">Họ tên <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="userFullName" placeholder="Nguyễn Văn A">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="userEmail" placeholder="user@email.com">
                    </div>
                    <div id="pwSection">
                        <div class="mb-3">
                            <label class="form-label fw-500">Mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="userPassword" placeholder="Tối thiểu 6 ký tự">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-primary rounded-pill px-4" id="btnSaveUser" onclick="saveUser()">
                        <i class="bi bi-check-lg me-1"></i>Lưu
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/admin.js"></script>
    <script src="/js/pagination.js"></script>
    <script src="/js/admin/users.js"></script>
</body>
</html>
