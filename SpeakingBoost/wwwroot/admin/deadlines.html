<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Deadline - SpeakingBoost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/admin-layout.css" rel="stylesheet">
</head>
<body>
<div id="pageLoader"><div class="logo-spin"><i class="bi bi-mic-fill"></i></div><p>Đang xác thực...</p></div>
<div id="sidebarPlaceholder"></div>
<div id="topbarPlaceholder"></div>

<main id="main"><div class="page-content">

    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="page-title">Quản lý Deadline</h1>
        <p class="text-muted mb-0" style="font-size:.85rem;">Gán bài tập cho lớp và theo dõi hạn nộp</p>
      </div>
      <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#modalBulk">
        <i class="bi bi-send-fill me-2"></i>Gán bài hàng loạt
      </button>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-sm-4"><div class="card-panel p-4 text-center">
        <div style="font-size:2rem;font-weight:700;color:#6366f1;" id="statTotal">--</div>
        <div class="text-muted" style="font-size:.82rem;">Deadline đang chạy</div>
      </div></div>
      <div class="col-sm-4"><div class="card-panel p-4 text-center">
        <div style="font-size:2rem;font-weight:700;color:#d97706;" id="statSoon">--</div>
        <div class="text-muted" style="font-size:.82rem;">Sắp hết hạn (24h)</div>
      </div></div>
      <div class="col-sm-4"><div class="card-panel p-4 text-center">
        <div style="font-size:2rem;font-weight:700;color:#dc2626;" id="statOverdue">--</div>
        <div class="text-muted" style="font-size:.82rem;">Đã quá hạn</div>
      </div></div>
    </div>

    <!-- Filters -->
    <div class="card-panel mb-3 p-3 d-flex gap-2 align-items-center flex-wrap">
      <select id="classFilter" class="form-select form-select-sm w-auto" onchange="filterDeadlines()">
        <option value="">Tất cả lớp</option>
      </select>
      <select id="statusFilter" class="form-select form-select-sm w-auto" onchange="filterDeadlines()">
        <option value="">Tất cả trạng thái</option>
        <option value="active">Đang mở</option>
        <option value="overdue">Đã quá hạn</option>
      </select>
    </div>

    <!-- Table -->
    <div class="card-panel p-0 overflow-hidden">
      <table class="table table-hover mb-0">
        <thead class="table-head">
          <tr><th>Bài tập</th><th>Lớp</th><th>Deadline</th><th>Trạng thái</th><th class="text-center">Xóa</th></tr>
        </thead>
        <tbody id="deadlineBody">
          <tr><td colspan="5" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Đang tải...</td></tr>
        </tbody>
      </table>
    </div>

</div></main>

<!-- Modal Gán hàng loạt -->
<div class="modal fade" id="modalBulk" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content admin-modal">
      <div class="modal-header border-0"><h5 class="modal-title">Gán bài tập hàng loạt</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body row g-3">
        <div class="col-md-6"><label class="form-label fw-500">Lớp học <span class="text-danger">*</span></label>
          <select class="form-select" id="bulkClassId"><option value="">-- Chọn lớp --</option></select></div>
        <div class="col-md-6"><label class="form-label fw-500">Deadline <span class="text-danger">*</span></label>
          <input type="datetime-local" class="form-control" id="bulkDeadline"></div>
        <div class="col-12"><label class="form-label fw-500">Chế độ gán</label>
          <div class="d-flex gap-3">
            <div class="form-check"><input class="form-check-input" type="radio" name="assignMode" id="modeByTopic" value="Topic" checked onchange="toggleAssignMode()">
              <label class="form-check-label" for="modeByTopic">Theo chủ đề</label></div>
            <div class="form-check"><input class="form-check-input" type="radio" name="assignMode" id="modeCustom" value="Custom" onchange="toggleAssignMode()">
              <label class="form-check-label" for="modeCustom">Tùy chọn bài tập</label></div>
          </div>
        </div>
        <div class="col-12" id="topicSection">
          <label class="form-label fw-500">Chủ đề</label>
          <select class="form-select" id="bulkTopicId"><option value="">-- Chọn chủ đề --</option></select>
        </div>
        <div class="col-12" id="customSection" style="display:none;">
          <label class="form-label fw-500">Chọn bài tập</label>
          <div id="exerciseCheckboxes" style="max-height:200px;overflow-y:auto;" class="border rounded p-2"></div>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-primary rounded-pill px-4" id="btnBulk" onclick="doBulkAssign()">
          <i class="bi bi-send me-1"></i>Gán bài
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script><script src="/js/admin.js"></script>
<script>
  initAdminPage('nav-deadlines', 'Quản lý Deadline');

  let allDeadlines = [], allClasses = [], allTopics = [];

  async function loadAll() {
    const res = await Api.get('/api/admin/deadlines');
    if (!res.success) { Toast.err('Lỗi tải dữ liệu!'); return; }

    const d = res.data;
    allDeadlines = d.activeDeadlines || [];
    allClasses   = d.classes || [];
    allTopics    = d.topics  || [];
    const allEx  = d.allExercises || [];

    // Populate dropdowns
    const classOpts = allClasses.map(c => `<option value="${c.classId}">${c.className}</option>`).join('');
    document.getElementById('classFilter').innerHTML = '<option value="">Tất cả lớp</option>' + classOpts;
    document.getElementById('bulkClassId').innerHTML = '<option value="">-- Chọn lớp --</option>' + classOpts;

    const topicOpts = allTopics.map(t => `<option value="${t.topicId}">${t.name}</option>`).join('');
    document.getElementById('bulkTopicId').innerHTML = '<option value="">-- Chọn chủ đề --</option>' + topicOpts;

    // Checkboxes
    document.getElementById('exerciseCheckboxes').innerHTML = allEx.map(e =>
      `<div class="form-check"><input class="form-check-input ex-chk" type="checkbox" value="${e.exerciseId}" id="exChk${e.exerciseId}">
       <label class="form-check-label" for="exChk${e.exerciseId}" style="font-size:.85rem;">[${e.type}] ${e.title}</label></div>`
    ).join('');

    updateStats(allDeadlines);
    filterDeadlines();
  }

  function updateStats(data) {
    const now   = new Date();
    const soon  = new Date(now.getTime() + 24*60*60*1000);
    document.getElementById('statTotal').textContent   = data.length;
    document.getElementById('statSoon').textContent    = data.filter(d => d.deadline && new Date(d.deadline) > now && new Date(d.deadline) < soon).length;
    document.getElementById('statOverdue').textContent = data.filter(d => d.isOverdue).length;
  }

  function filterDeadlines() {
    const cls    = document.getElementById('classFilter').value;
    const status = document.getElementById('statusFilter').value;
    const filtered = allDeadlines.filter(d => {
      const clsMatch    = !cls || String(d.classId) === cls;
      const statusMatch = !status || (status === 'overdue' ? d.isOverdue : !d.isOverdue);
      return clsMatch && statusMatch;
    });
    renderTable(filtered);
  }

  function renderTable(data) {
    const tbody = document.getElementById('deadlineBody');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">Không có deadline nào</td></tr>'; return; }
    tbody.innerHTML = data.map(d => {
      const overdue = d.isOverdue;
      const badge   = overdue
        ? '<span style="background:#fee2e2;color:#dc2626;padding:.2rem .6rem;border-radius:20px;font-size:.72rem;font-weight:600;">Quá hạn</span>'
        : '<span style="background:#dcfce7;color:#16a34a;padding:.2rem .6rem;border-radius:20px;font-size:.72rem;font-weight:600;">Đang mở</span>';
      return `<tr>
        <td class="fw-500">${d.exerciseTitle}</td>
        <td><span class="badge bg-light text-dark">${d.className}</span></td>
        <td style="color:${overdue?'#dc2626':'#374151'}">${d.deadline ? fmtDateTime(d.deadline) : '—'}</td>
        <td>${badge}</td>
        <td class="text-center">
          <button class="btn btn-sm btn-light rounded-pill" onclick="deleteDeadline(${d.classExerciseId})" title="Xóa deadline">
            <i class="bi bi-trash-fill text-danger"></i>
          </button>
        </td>
      </tr>`;
    }).join('');
  }

  async function deleteDeadline(id) {
    if (!await adminConfirm('Xóa deadline này?')) return;
    const res = await Api.del(`/api/admin/deadlines/${id}`);
    if (res.success) { Toast.ok('Đã xóa!'); loadAll(); }
    else Toast.err(res.message || 'Lỗi!');
  }

  function toggleAssignMode() {
    const mode = document.querySelector('input[name="assignMode"]:checked').value;
    document.getElementById('topicSection').style.display   = mode === 'Topic'  ? '' : 'none';
    document.getElementById('customSection').style.display  = mode === 'Custom' ? '' : 'none';
  }

  async function doBulkAssign() {
    const classId  = document.getElementById('bulkClassId').value;
    const deadline = document.getElementById('bulkDeadline').value;
    const mode     = document.querySelector('input[name="assignMode"]:checked').value;
    const topicId  = document.getElementById('bulkTopicId').value;
    const selectedExIds = [...document.querySelectorAll('.ex-chk:checked')].map(c => parseInt(c.value));

    if (!classId)  { Toast.err('Vui lòng chọn lớp.'); return; }
    if (!deadline) { Toast.err('Vui lòng nhập deadline.'); return; }
    if (mode === 'Topic' && !topicId) { Toast.err('Vui lòng chọn chủ đề.'); return; }
    if (mode === 'Custom' && !selectedExIds.length) { Toast.err('Vui lòng chọn ít nhất 1 bài tập.'); return; }

    const btn = document.getElementById('btnBulk');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Đang gán...';

    const body = {
      classId: parseInt(classId),
      deadline: deadline,
      assignMode: mode,
      selectedTopicId: mode === 'Topic' ? parseInt(topicId) : null,
      selectedExerciseIds: mode === 'Custom' ? selectedExIds : []
    };

    const res = await Api.post('/api/admin/deadlines/bulk', body);
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-send me-1"></i>Gán bài';

    if (res.success) {
      Toast.ok(res.message || 'Gán bài thành công và đã gửi email!');
      bootstrap.Modal.getInstance(document.getElementById('modalBulk'))?.hide();
      loadAll();
    } else Toast.err(res.message || 'Gán thất bại.');
  }

  AuthGuard.onReady(() => loadAll());
</script>
</body></html>
