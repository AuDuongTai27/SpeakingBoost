<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Deadline - SpeakingBoost</title>
  <meta name="description" content="Gán bài tập cho lớp theo chủ đề — SpeakingBoost Admin">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="/css/admin-layout.css" rel="stylesheet">
</head>

<body>

  <div id="pageLoader">
    <div class="logo-spin"><i class="bi bi-mic-fill"></i></div>
    <p>Đang xác thực...</p>
  </div>
  <div id="sidebarPlaceholder"></div>
  <div id="topbarPlaceholder"></div>

  <main id="main">
    <div class="page-content">

      <!-- Header -->
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <h1 class="page-title">Quản lý Deadline</h1>
          <p class="text-muted mb-0" style="font-size:.85rem;">Gán bài tập theo chủ đề cho lớp và theo dõi hạn nộp</p>
        </div>
        <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#modalBulk">
          <i class="bi bi-send-fill me-2"></i>Gán bài theo chủ đề
        </button>
      </div>

      <!-- Stats -->
      <div class="row g-3 mb-4">
        <div class="col-sm-4">
          <div class="card-panel p-4 text-center">
            <div style="font-size:2rem;font-weight:700;color:#6366f1;" id="statTotal">--</div>
            <div class="text-muted" style="font-size:.82rem;">Deadline đang chạy</div>
          </div>
        </div>
        <div class="col-sm-4">
          <div class="card-panel p-4 text-center">
            <div style="font-size:2rem;font-weight:700;color:#d97706;" id="statSoon">--</div>
            <div class="text-muted" style="font-size:.82rem;">Sắp hết hạn (24h)</div>
          </div>
        </div>
        <div class="col-sm-4">
          <div class="card-panel p-4 text-center">
            <div style="font-size:2rem;font-weight:700;color:#dc2626;" id="statOverdue">--</div>
            <div class="text-muted" style="font-size:.82rem;">Đã quá hạn</div>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="card-panel mb-3 p-3 d-flex gap-2 align-items-center flex-wrap">
        <select id="classFilter" class="form-select form-select-sm w-auto">
          <option value="">Tất cả lớp</option>
        </select>
        <select id="statusFilter" class="form-select form-select-sm w-auto">
          <option value="">Tất cả trạng thái</option>
          <option value="active">Đang mở</option>
          <option value="overdue">Đã quá hạn</option>
        </select>
      </div>

      <!-- Table -->
      <div class="card-panel p-0 overflow-hidden">
        <table class="table table-hover mb-0">
          <thead class="table-head">
            <tr>
              <th>Lớp</th>
              <th>Bài tập</th>
              <th>Deadline</th>
              <th>Trạng thái</th>
              <th class="text-center">Xóa</th>
            </tr>
          </thead>
          <tbody id="deadlineBody">
            <tr>
              <td colspan="5" class="text-center py-4 text-muted">
                <div class="spinner-border spinner-border-sm me-2"></div>Đang tải...
              </td>
            </tr>
          </tbody>
        </table>
        <div class="pagination-wrap" id="pgWrap">
          <span class="pagination-info" id="pgInfo"></span>
        </div>
      </div>

    </div>
  </main>

  <!-- Modal Gán theo chủ đề -->
  <div class="modal fade" id="modalBulk" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content admin-modal">
        <div class="modal-header border-0">
          <h5 class="modal-title">Gán bài tập theo Chủ đề</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body row g-3">
          <div class="col-12">
            <label class="form-label fw-500">Lớp học <span class="text-danger">*</span></label>
            <select class="form-select" id="bulkClassId">
              <option value="">-- Chọn lớp --</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label fw-500">Chủ đề <span class="text-danger">*</span></label>
            <select class="form-select" id="bulkTopicId">
              <option value="">-- Chọn chủ đề --</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label fw-500">Deadline <span class="text-danger">*</span></label>
            <input type="datetime-local" class="form-control" id="bulkDeadline">
          </div>
        </div>
        <div class="modal-footer border-0">
          <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
          <button class="btn btn-primary rounded-pill px-4" id="btnBulk" onclick="doBulkAssign()">
            <i class="bi bi-send me-1"></i>Gán bài
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
  <script src="/js/pagination.js"></script>
  <script src="/js/admin/deadlines.js"></script>
</body>

</html>
