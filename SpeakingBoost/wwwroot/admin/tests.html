<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đề thi - SpeakingBoost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/admin-layout.css" rel="stylesheet">
</head>
<body>
<div id="pageLoader"><div class="logo-spin"><i class="bi bi-mic-fill"></i></div><p>Đang xác thực...</p></div>
<div id="sidebarPlaceholder"></div>
<div id="topbarPlaceholder"></div>

<main id="main"><div class="page-content">

    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="page-title">Quản lý Đề thi</h1>
        <p class="text-muted mb-0" style="font-size:.85rem;">Tổ chức câu hỏi theo Chủ đề và loại Part</p>
      </div>
      <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#modalTopic" onclick="openCreateTopic()">
        <i class="bi bi-plus-circle-fill me-2"></i>Thêm chủ đề
      </button>
    </div>

    <!-- Topics Grid -->
    <div id="topicsGrid" class="row g-3">
      <div class="col-12 text-center py-5 text-muted"><div class="spinner-border me-2"></div>Đang tải...</div>
    </div>

</div></main>

<!-- Modal Tạo/Sửa Topic -->
<div class="modal fade" id="modalTopic" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content admin-modal">
      <div class="modal-header border-0"><h5 class="modal-title" id="modalTopicTitle">Thêm chủ đề</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="topicId">
        <div class="mb-3"><label class="form-label fw-500">Tên chủ đề <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="topicName" placeholder="VD: Environment & Nature"></div>
        <div class="mb-3"><label class="form-label fw-500">Mô tả</label>
          <input type="text" class="form-control" id="topicDesc" placeholder="Bộ đề dự đoán Quý 1/2025"></div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-primary rounded-pill px-4" onclick="saveTopic()"><i class="bi bi-check-lg me-1"></i>Lưu</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Import Excel -->
<div class="modal fade" id="modalImport" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content admin-modal">
      <div class="modal-header border-0"><h5 class="modal-title">Import câu hỏi từ Excel</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="importTopicId">
        <div class="mb-3">
          <div class="p-3 rounded-3 mb-3" style="background:#f0f9ff;border:1px solid #bae6fd;">
            <p class="mb-1 fw-500" style="font-size:.85rem;color:#0369a1;"><i class="bi bi-info-circle me-1"></i>Định dạng file Excel:</p>
            <small class="text-muted">Cột A: Tiêu đề | Cột B: Part (1/2/3) | Cột C: Câu hỏi* | Cột D: Câu trả lời mẫu | Cột E: Số lần làm</small>
          </div>
          <a href="/templates/Mau_Import_Cau_Hoi.xlsx" class="btn btn-sm btn-outline-secondary rounded-pill mb-3">
            <i class="bi bi-download me-1"></i>Tải file mẫu
          </a>
          <label class="form-label fw-500">Chọn file Excel</label>
          <input type="file" class="form-control" id="importFile" accept=".xlsx,.xls">
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-success rounded-pill px-4" id="btnImport" onclick="doImport()">
          <i class="bi bi-upload me-1"></i>Import
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script><script src="/js/admin.js"></script>
<script>
  initAdminPage('nav-tests', 'Quản lý Đề thi');
  let allTopics = [];

  async function loadTopics() {
    const res = await Api.get('/api/admin/tests/topics');
    if (!res.success) { Toast.err('Lỗi tải dữ liệu!'); return; }
    allTopics = res.data;
    renderTopics(allTopics);
  }

  function renderTopics(topics) {
    const grid = document.getElementById('topicsGrid');
    if (!topics.length) { grid.innerHTML = '<div class="col-12 text-center py-5 text-muted"><i class="bi bi-collection" style="font-size:3rem;opacity:.3;"></i><p class="mt-2">Chưa có chủ đề nào</p></div>'; return; }
    grid.innerHTML = topics.map(t => `
      <div class="col-md-6 col-xl-4">
        <div class="card-panel p-4 h-100" style="border-top:3px solid #6366f1;">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
              <h6 class="fw-600 mb-1" style="font-size:.95rem;">${t.name}</h6>
              <small class="text-muted">${t.description || 'Không có mô tả'}</small>
            </div>
            <span class="badge rounded-pill" style="background:#ede9fe;color:#6366f1;">${t.exerciseCount} câu</span>
          </div>
          <p class="text-muted mb-3" style="font-size:.78rem;"><i class="bi bi-calendar3 me-1"></i>${fmtDate(t.createdAt)}</p>
          <div class="d-flex gap-2 flex-wrap">
            <a href="/admin/topic-detail.html?id=${t.topicId}" class="btn btn-sm btn-primary rounded-pill flex-grow-1">
              <i class="bi bi-eye me-1"></i>Xem câu hỏi
            </a>
            <button class="btn btn-sm btn-light rounded-pill" onclick="openImport(${t.topicId})" title="Import Excel">
              <i class="bi bi-file-earmark-excel text-success"></i>
            </button>
            <button class="btn btn-sm btn-light rounded-pill" onclick="deleteTopic(${t.topicId},'${t.name}')" title="Xóa">
              <i class="bi bi-trash-fill text-danger"></i>
            </button>
          </div>
        </div>
      </div>`).join('');
  }

  function openCreateTopic() {
    document.getElementById('modalTopicTitle').textContent = 'Thêm chủ đề mới';
    document.getElementById('topicId').value = '';
    document.getElementById('topicName').value = '';
    document.getElementById('topicDesc').value = '';
  }

  async function saveTopic() {
    const id   = document.getElementById('topicId').value;
    const name = document.getElementById('topicName').value.trim();
    const desc = document.getElementById('topicDesc').value.trim();
    if (!name) { Toast.err('Vui lòng nhập tên chủ đề.'); return; }
    const res = await Api.post('/api/admin/tests/topics', { name, description: desc || null });
    if (res.success) {
      Toast.ok('Thêm chủ đề thành công!');
      bootstrap.Modal.getInstance(document.getElementById('modalTopic'))?.hide();
      loadTopics();
    } else Toast.err(res.message || 'Lỗi!');
  }

  async function deleteTopic(id, name) {
    if (!await adminConfirm(`Xóa chủ đề "${name}" và tất cả câu hỏi trong đó?`)) return;
    const res = await Api.del(`/api/admin/tests/topics/${id}`);
    if (res.success) { Toast.ok('Đã xóa chủ đề!'); loadTopics(); }
    else Toast.err(res.message || 'Không thể xóa — có thể đã có bài nộp.');
  }

  function openImport(topicId) {
    document.getElementById('importTopicId').value = topicId;
    document.getElementById('importFile').value = '';
    new bootstrap.Modal(document.getElementById('modalImport')).show();
  }

  async function doImport() {
    const topicId = document.getElementById('importTopicId').value;
    const file    = document.getElementById('importFile').files[0];
    if (!file) { Toast.err('Vui lòng chọn file Excel.'); return; }

    const btn = document.getElementById('btnImport');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Đang import...';

    const fd = new FormData();
    fd.append('excelFile', file);
    const res = await Api.postForm(`/api/admin/tests/topics/${topicId}/import`, fd);

    btn.disabled = false; btn.innerHTML = '<i class="bi bi-upload me-1"></i>Import';
    if (res.success) {
      Toast.ok(res.message || 'Import thành công!');
      bootstrap.Modal.getInstance(document.getElementById('modalImport'))?.hide();
      loadTopics();
    } else Toast.err(res.message || 'Import thất bại.');
  }

  AuthGuard.onReady(() => loadTopics());
</script>
</body></html>
