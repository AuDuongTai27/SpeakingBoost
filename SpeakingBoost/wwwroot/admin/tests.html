<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đề thi - SpeakingBoost</title>
    <meta name="description" content="Quản lý chủ đề và câu hỏi IELTS Speaking — SpeakingBoost Admin">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/admin-layout.css" rel="stylesheet">
</head>
<body>

<div id="pageLoader"><div class="logo-spin"><i class="bi bi-mic-fill"></i></div><p>Đang xác thực...</p></div>
<div id="sidebarPlaceholder"></div>
<div id="topbarPlaceholder"></div>

<main id="main">
  <div class="page-content">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="page-title">Quản lý Đề thi</h1>
        <p class="text-muted mb-0" style="font-size:.85rem;">Tổ chức câu hỏi theo Chủ đề và loại Part</p>
      </div>
      <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#modalTopic" onclick="openCreateTopic()">
        <i class="bi bi-plus-circle-fill me-2"></i>Thêm chủ đề
      </button>
    </div>

    <!-- Topics Grid -->
    <div id="topicsGrid" class="row g-3">
      <div class="col-12 text-center py-5 text-muted">
        <div class="spinner-border me-2"></div>Đang tải...
      </div>
    </div>

  </div>
</main>

<!-- Modal Tạo/Sửa Topic -->
<div class="modal fade" id="modalTopic" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content admin-modal">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalTopicTitle">Thêm chủ đề</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="topicId">
        <div class="mb-3">
          <label class="form-label fw-500">Tên chủ đề <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="topicName" placeholder="VD: Environment & Nature">
        </div>
        <div class="mb-3">
          <label class="form-label fw-500">Mô tả</label>
          <input type="text" class="form-control" id="topicDesc" placeholder="Bộ đề dự đoán Quý 1/2025">
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-primary rounded-pill px-4" onclick="saveTopic()">
          <i class="bi bi-check-lg me-1"></i>Lưu
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Import Excel -->
<div class="modal fade" id="modalImport" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content admin-modal">
      <div class="modal-header border-0">
        <h5 class="modal-title">Import câu hỏi từ Excel</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="importTopicId">
        <div class="p-3 rounded-3 mb-3" style="background:#f0f9ff;border:1px solid #bae6fd;">
          <p class="mb-1 fw-500" style="font-size:.85rem;color:#0369a1;">
            <i class="bi bi-info-circle me-1"></i>Định dạng file Excel:
          </p>
          <small class="text-muted">Cột A: Tiêu đề | Cột B: Part (1/2/3) | Cột C: Câu hỏi* | Cột D: Câu trả lời mẫu | Cột E: Số lần làm</small>
        </div>
        <a href="/templates/Mau_Import_Cau_Hoi.xlsx" class="btn btn-sm btn-outline-secondary rounded-pill mb-3">
          <i class="bi bi-download me-1"></i>Tải file mẫu
        </a>
        <div>
          <label class="form-label fw-500">Chọn file Excel</label>
          <input type="file" class="form-control" id="importFile" accept=".xlsx,.xls">
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-success rounded-pill px-4" id="btnImport" onclick="doImport()">
          <i class="bi bi-upload me-1"></i>Import
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/admin/tests.js"></script>
</body>
</html>
