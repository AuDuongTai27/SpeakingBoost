<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Lớp học - SpeakingBoost</title>
    <meta name="description" content="Chi tiết lớp học — SpeakingBoost Admin">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/admin-layout.css" rel="stylesheet">
</head>
<body>

<div id="pageLoader"><div class="logo-spin"><i class="bi bi-mic-fill"></i></div><p>Đang xác thực...</p></div>
<div id="sidebarPlaceholder"></div>
<div id="topbarPlaceholder"></div>

<main id="main">
  <div class="page-content">

    <!-- Breadcrumb -->
    <nav class="mb-3">
      <ol class="breadcrumb mb-0" style="font-size:.83rem;">
        <li class="breadcrumb-item"><a href="/admin/classes.html" class="text-decoration-none text-muted">Lớp học</a></li>
        <li class="breadcrumb-item active" id="breadCrumbName">Chi tiết</li>
      </ol>
    </nav>

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="page-title" id="pageTitle">Đang tải...</h1>
        <p class="text-muted mb-0" style="font-size:.85rem;" id="pageSubtitle">Sĩ số: —</p>
      </div>
      <a href="/admin/classes.html" class="btn btn-light rounded-pill px-3">
        <i class="bi bi-arrow-left me-1"></i>Quay lại
      </a>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-4" id="detailTabs">
      <li class="nav-item">
        <button class="nav-link active" onclick="showTab('students')">
          <i class="bi bi-people me-1"></i>Học sinh (<span id="studentCount">0</span>)
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" onclick="showTab('exercises')">
          <i class="bi bi-journal-text me-1"></i>Bài tập (<span id="exerciseCount">0</span>)
        </button>
      </li>
    </ul>

    <!-- Tab: Students -->
    <div id="tabStudents">
      <div class="card-panel mb-3 p-3 d-flex gap-2 flex-wrap align-items-center">
        <select class="form-select form-select-sm w-auto" id="addStudentSelect" style="min-width:260px;">
          <option value="">-- Chọn học sinh để thêm --</option>
        </select>
        <button class="btn btn-sm btn-primary rounded-pill px-3" onclick="addStudent()">
          <i class="bi bi-person-plus me-1"></i>Thêm vào lớp
        </button>
      </div>
      <div class="card-panel p-0 overflow-hidden">
        <table class="table table-hover mb-0">
          <thead class="table-head">
            <tr><th>Họ tên</th><th>Email</th><th>Bài đã nộp</th><th class="text-center">Xóa khỏi lớp</th></tr>
          </thead>
          <tbody id="studentsBody">
            <tr><td colspan="4" class="text-center py-4 text-muted">Đang tải...</td></tr>
          </tbody>
        </table>
        <div class="pagination-wrap" id="pgStudentWrap">
          <span class="pagination-info" id="pgStudentInfo"></span>
        </div>
      </div>
    </div>

    <!-- Tab: Exercises (view-only) -->
    <div id="tabExercises" style="display:none;">
      <div class="card-panel p-0 overflow-hidden">
        <table class="table table-hover mb-0">
          <thead class="table-head">
            <tr><th>Bài tập</th><th>Loại</th><th>Deadline</th><th>Trạng thái</th></tr>
          </thead>
          <tbody id="exercisesBody">
            <tr><td colspan="4" class="text-center py-4 text-muted">Đang tải...</td></tr>
          </tbody>
        </table>
        <div class="pagination-wrap" id="pgExerciseWrap">
          <span class="pagination-info" id="pgExerciseInfo"></span>
        </div>
      </div>
      <p class="text-muted mt-2" style="font-size:.82rem;">
        <i class="bi bi-info-circle me-1"></i>
        Gán bài theo chủ đề từ trang <a href="/admin/deadlines.html">Deadline</a>.
      </p>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/pagination.js"></script>
<script src="/js/admin/class-detail.js"></script>
</body>
</html>
