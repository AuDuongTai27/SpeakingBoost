<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - SpeakingBoost Admin</title>
    <meta name="description" content="Quản lý thông tin tài khoản Admin — SpeakingBoost">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/admin-layout.css" rel="stylesheet">
</head>
<body>

<div id="pageLoader"><div class="logo-spin"><i class="bi bi-mic-fill"></i></div><p>Đang xác thực...</p></div>
<div id="sidebarPlaceholder"></div>
<div id="topbarPlaceholder"></div>

<main id="main">
  <div class="page-content">

    <h1 class="page-title mb-1">Hồ sơ cá nhân</h1>
    <p class="text-muted mb-4" style="font-size:.9rem;">Quản lý thông tin tài khoản của bạn</p>

    <div class="row g-4">

      <!-- Info card -->
      <div class="col-md-4">
        <div class="card-panel p-4 text-center">
          <div id="profileAvatar" style="width:72px;height:72px;border-radius:50%;
               background:linear-gradient(135deg,#6366f1,#06b6d4);
               display:flex;align-items:center;justify-content:center;
               font-size:1.6rem;color:#fff;font-weight:700;margin:0 auto 1rem;">A</div>
          <h5 class="fw-600 mb-1" id="profileName">...</h5>
          <p class="text-muted mb-2" style="font-size:.85rem;" id="profileEmail">...</p>
          <span class="pill-badge" style="background:#ede9fe;color:#7c3aed;" id="profileRole">Admin</span>
        </div>
      </div>

      <!-- Edit card -->
      <div class="col-md-8">
        <div class="card-panel p-4">
          <h6 class="fw-600 mb-4">Cập nhật thông tin</h6>
          <div class="mb-3">
            <label class="form-label fw-500">Họ và tên</label>
            <input type="text" class="form-control" id="editFullName" placeholder="Nguyễn Văn A">
          </div>
          <div class="mb-3">
            <label class="form-label fw-500">Mật khẩu mới <span class="text-muted fw-normal">(để trống = giữ nguyên)</span></label>
            <input type="password" class="form-control" id="editPassword" placeholder="Tối thiểu 6 ký tự">
          </div>
          <div class="d-flex justify-content-end">
            <button class="btn btn-primary rounded-pill px-4" id="btnSaveProfile" onclick="saveProfile()">
              <i class="bi bi-check-lg me-1"></i>Lưu thay đổi
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/admin/profile.js"></script>
</body>
</html>
