<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Chủ đề - SpeakingBoost</title>
    <meta name="description" content="Quản lý câu hỏi theo chủ đề — SpeakingBoost Admin">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/admin-layout.css" rel="stylesheet">
</head>
<body>

<div id="pageLoader"><div class="logo-spin"><i class="bi bi-mic-fill"></i></div><p>Đang xác thực...</p></div>
<div id="sidebarPlaceholder"></div>
<div id="topbarPlaceholder"></div>

<main id="main">
  <div class="page-content">

    <!-- Breadcrumb -->
    <nav class="mb-3">
      <ol class="breadcrumb mb-0" style="font-size:.83rem;">
        <li class="breadcrumb-item"><a href="/admin/tests.html" class="text-decoration-none text-muted">Đề thi</a></li>
        <li class="breadcrumb-item active" id="breadName">Chi tiết</li>
      </ol>
    </nav>

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="page-title" id="pageTitle">Đang tải...</h1>
        <p class="text-muted mb-0" style="font-size:.85rem;" id="pageDesc"></p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-success rounded-pill px-3" onclick="openImport()">
          <i class="bi bi-file-earmark-excel me-1"></i>Import Excel
        </button>
        <button class="btn btn-primary rounded-pill px-4" onclick="openAddExercise()">
          <i class="bi bi-plus-circle-fill me-2"></i>Thêm câu hỏi
        </button>
      </div>
    </div>

    <!-- Filter -->
    <div class="card-panel mb-3 p-3 d-flex gap-2 align-items-center flex-wrap">
      <select id="partFilter" class="form-select form-select-sm w-auto">
        <option value="">Tất cả Part</option>
        <option value="part1">Part 1</option>
        <option value="part2">Part 2</option>
        <option value="part3">Part 3</option>
      </select>
      <input type="text" id="searchQ" class="form-control form-control-sm"
             style="max-width:300px;" placeholder="Tìm câu hỏi...">
    </div>

    <!-- Exercises list -->
    <div id="exercisesList"></div>

  </div>
</main>

<!-- Modal Thêm/Sửa câu hỏi -->
<div class="modal fade" id="modalExercise" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content admin-modal">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalExTitle">Thêm câu hỏi</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body row g-3">
        <input type="hidden" id="exId">
        <div class="col-12">
          <label class="form-label fw-500">Tiêu đề <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="exTitle" placeholder="VD: Describe your hometown">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Loại <span class="text-danger">*</span></label>
          <select class="form-select" id="exType">
            <option value="Part1">Part 1 — Short answers</option>
            <option value="Part2">Part 2 — Long turn</option>
            <option value="Part3">Part 3 — Discussion</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Số lần làm tối đa</label>
          <input type="number" class="form-control" id="exMaxAttempts" value="3" min="1" max="10">
        </div>
        <div class="col-12">
          <label class="form-label fw-500">Câu hỏi <span class="text-danger">*</span></label>
          <textarea class="form-control" id="exQuestion" rows="3" placeholder="Nhập nội dung câu hỏi..."></textarea>
        </div>
        <div class="col-12">
          <label class="form-label fw-500">Câu trả lời mẫu</label>
          <textarea class="form-control" id="exSample" rows="3" placeholder="Gợi ý câu trả lời..."></textarea>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-primary rounded-pill px-4" onclick="saveExercise()">
          <i class="bi bi-check-lg me-1"></i>Lưu
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Import -->
<div class="modal fade" id="modalImport" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content admin-modal">
      <div class="modal-header border-0">
        <h5 class="modal-title">Import câu hỏi từ Excel</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="p-3 rounded-3 mb-3" style="background:#f0f9ff;border:1px solid #bae6fd;">
          <p class="mb-1 fw-500" style="font-size:.85rem;color:#0369a1;">
            <i class="bi bi-info-circle me-1"></i>Định dạng:
          </p>
          <small class="text-muted">Cột A: Tiêu đề | Cột B: Part (1/2/3) | Cột C: Câu hỏi* | Cột D: Câu trả lời mẫu | Cột E: Số lần làm</small>
        </div>
        <a href="/templates/Mau_Import_Cau_Hoi.xlsx" class="btn btn-sm btn-outline-secondary rounded-pill mb-3">
          <i class="bi bi-download me-1"></i>Tải file mẫu
        </a>
        <input type="file" class="form-control" id="importFile" accept=".xlsx,.xls">
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-success rounded-pill px-4" id="btnImport" onclick="doImport()">
          <i class="bi bi-upload me-1"></i>Import
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/admin/topic-detail.js"></script>
</body>
</html>
