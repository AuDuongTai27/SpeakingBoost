<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Speaking - SpeakingBoost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="/css/student-layout.css" rel="stylesheet">
</head>
<body>
<div id="pageLoader" class="page-loader">
    <div class="loader-icon"><i class="bi bi-mic-fill"></i></div>
    <div class="loader-text">Đang tải...</div>
</div>

<div id="navbarPlaceholder"></div>

<!-- ═══ QUESTION HEADER ═══════════════════════════════════════════ -->
<section style="background:linear-gradient(135deg,#6366f1,#818cf8);padding:32px 0;" id="questionHeader">
    <div class="container">
        <div class="d-flex align-items-center gap-2 mb-2" style="font-size:0.82rem;color:rgba(255,255,255,0.7);">
            <a href="/student/practice.html" style="color:rgba(255,255,255,0.7);text-decoration:none;">Luyện Speaking</a>
            <i class="bi bi-chevron-right" style="font-size:0.7rem;"></i>
            <span id="headerTopicName" style="color:#fff;">Đang tải...</span>
        </div>
        <div class="d-flex align-items-center gap-3 flex-wrap">
            <span id="headerPartBadge" class="part-badge" style="background:rgba(255,255,255,0.2);color:#fff;font-size:0.78rem;">Part</span>
            <h1 id="headerTitle" style="font-size:1.25rem;font-weight:800;color:#fff;margin:0;">Đang tải...</h1>
            <span id="headerCount" style="margin-left:auto;font-size:0.82rem;color:rgba(255,255,255,0.8);"></span>
        </div>
    </div>
</section>

<!-- ═══ MAIN ═════════════════════════════════════════════════════ -->
<main style="background:#f0f4f8;padding:28px 0;min-height:calc(100vh - 200px);">
    <div class="container">
        <div class="row g-4">
            <!-- RIGHT: Question list + current question card -->
            <div class="col-lg-4 order-lg-2">
                <div class="card-base p-4 mb-3" id="questionCard">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <span id="qPartBadge" class="part-badge" style="background:#ede9fe;color:#7c3aed;">Part</span>
                        <span id="qNum" style="font-size:0.78rem;color:#64748b;font-weight:500;"></span>
                    </div>
                    <h2 id="questionText" style="font-size:1rem;font-weight:700;color:#1e293b;line-height:1.6;margin:0;">Đang tải...</h2>
                </div>
                <div class="card-base p-3">
                    <div style="font-size:0.78rem;font-weight:700;color:#64748b;margin-bottom:10px;">Danh sách câu hỏi</div>
                    <div id="questionList"></div>
                </div>
            </div>

            <!-- LEFT: Recorder -->
            <div class="col-lg-8 order-lg-1">
                <div class="card-base p-4">
                    <div style="font-size:0.82rem;font-weight:700;color:#64748b;margin-bottom:1.5rem;">
                        <i class="bi bi-mic-fill me-1" style="color:#6366f1;"></i>Nhấn để bắt đầu ghi âm
                    </div>
                    <div class="recorder-area mb-4">
                        <button id="recordBtn" onclick="toggleRecord()"><i class="bi bi-mic-fill"></i></button>
                        <div id="recordTimer">00:00</div>
                        <div id="recordStatus">Nhấn nút để bắt đầu ghi âm</div>
                        <audio id="audioPlayback" controls></audio>
                    </div>
                    <div class="d-flex gap-2 flex-wrap mb-3">
                        <button class="btn btn-primary rounded-pill fw-semibold" id="submitBtn" onclick="submitAnswer()" disabled>
                            <i class="bi bi-send-fill me-2"></i>Nộp bài
                        </button>
                        <button class="btn btn-outline-secondary rounded-pill" onclick="resetRecording()">
                            <i class="bi bi-arrow-clockwise me-1"></i>Ghi lại
                        </button>
                    </div>

                    <!-- Result panel (hidden until evaluated) -->
                    <div id="resultPanel" class="result-panel" style="display:none;">
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <h5 style="font-weight:700;font-size:0.95rem;margin:0;"><i class="bi bi-check-circle-fill me-2" style="color:#16a34a;"></i>Kết quả chấm điểm</h5>
                            <div id="resultScoreCircle" class="score-circle" style="width:80px;height:80px;">
                                <div class="score-val" style="font-size:1.8rem;">—</div>
                                <div class="score-lbl">Band</div>
                            </div>
                        </div>
                        <div class="row g-3 mb-3" id="resultSubScores"></div>
                        <div class="transcript-box mb-3" id="resultTranscript" style="display:none;">
                            <div style="font-size:0.72rem;font-weight:700;color:#6366f1;margin-bottom:8px;">TRANSCRIPT</div>
                            <p id="transcriptText" style="margin:0;font-size:0.9rem;line-height:1.7;"></p>
                        </div>
                        <div class="feedback-box mb-3" id="resultFeedback" style="display:none;">
                            <div style="font-size:0.72rem;font-weight:700;color:#6366f1;margin-bottom:8px;">AI FEEDBACK</div>
                            <p id="feedbackText" style="margin:0;font-size:0.9rem;line-height:1.7;"></p>
                        </div>
                        <div class="d-flex gap-2 flex-wrap">
                            <a href="/student/history.html" class="btn btn-outline-primary rounded-pill btn-sm"><i class="bi bi-clock-history me-1"></i>Xem lịch sử</a>
                            <button class="btn btn-primary rounded-pill btn-sm" onclick="nextQuestion()"><i class="bi bi-arrow-right me-1"></i>Câu tiếp theo</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer style="background:#1e293b;color:#94a3b8;padding:28px 0;">
    <div class="container">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2" style="font-size:0.78rem;">
            <span>© 2026 SpeakingBoost. All rights reserved.</span>
            <span>Made with <i class="bi bi-heart-fill text-danger"></i> for IELTS Learners</span>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/student.js"></script>
<script>
    const params = new URLSearchParams(location.search);
    const topicId = parseInt(params.get('topicId')) || 0;
    const part = parseInt(params.get('part')) || 0;

    let questions = [];
    let currentIdx = 0;
    let mediaRecorder = null;
    let audioChunks = [];
    let audioBlob = null;
    let isRecording = false;
    let timerInterval = null;
    let seconds = 0;
    let pollingInterval = null;

    function jumpTo(idx) {
        currentIdx = idx;
        document.querySelectorAll('.question-list-item').forEach((el, i) => el.classList.toggle('active', i === idx));
        const q = questions[idx];
        document.getElementById('questionText').textContent = `"${q.question}"`;
        document.getElementById('qNum').textContent = `Câu hỏi ${idx + 1}`;
        document.getElementById('headerCount').textContent = `Câu ${idx + 1} / ${questions.length}`;
        resetRecording();
    }

    function nextQuestion() {
        if (currentIdx < questions.length - 1) jumpTo(currentIdx + 1);
        else Toast.ok('Bạn đã hoàn thành tất cả câu hỏi!');
    }

    async function toggleRecord() {
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const url = URL.createObjectURL(audioBlob);
                    const ap = document.getElementById('audioPlayback');
                    ap.src = url; ap.style.display = 'block';
                    document.getElementById('submitBtn').disabled = false;
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                isRecording = true;
                const btn = document.getElementById('recordBtn');
                btn.classList.add('recording'); btn.innerHTML = '<i class="bi bi-stop-fill"></i>';
                document.getElementById('recordStatus').textContent = '🔴 Đang ghi âm... Nhấn dừng để kết thúc';
                seconds = 0;
                timerInterval = setInterval(() => {
                    seconds++;
                    const m = Math.floor(seconds/60).toString().padStart(2,'0');
                    const s = (seconds%60).toString().padStart(2,'0');
                    document.getElementById('recordTimer').textContent = `${m}:${s}`;
                }, 1000);
            } catch(e) { Toast.err('Không thể truy cập microphone: ' + e.message); }
        } else {
            isRecording = false;
            mediaRecorder.stop();
            clearInterval(timerInterval);
            const btn = document.getElementById('recordBtn');
            btn.classList.remove('recording'); btn.innerHTML = '<i class="bi bi-mic-fill"></i>';
            document.getElementById('recordStatus').textContent = 'Đã ghi xong. Nhấn nộp bài hoặc ghi lại.';
        }
    }

    function resetRecording() {
        if (isRecording && mediaRecorder) mediaRecorder.stop();
        isRecording = false; clearInterval(timerInterval); clearInterval(pollingInterval);
        seconds = 0;
        document.getElementById('recordTimer').textContent = '00:00';
        document.getElementById('recordStatus').textContent = 'Nhấn nút để bắt đầu ghi âm';
        const btn = document.getElementById('recordBtn');
        btn.classList.remove('recording'); btn.innerHTML = '<i class="bi bi-mic-fill"></i>';
        document.getElementById('audioPlayback').style.display = 'none';
        document.getElementById('audioPlayback').src = '';
        document.getElementById('resultPanel').style.display = 'none';
        document.getElementById('submitBtn').disabled = true;
        audioBlob = null;
    }

    async function submitAnswer() {
        if (!audioBlob) { Toast.err('Vui lòng ghi âm trước khi nộp bài.'); return; }
        const q = questions[currentIdx];
        const fd = new FormData();
        fd.append('audio', audioBlob, 'recording.webm');
        fd.append('exerciseId', q.exerciseId);
        fd.append('part', part || 1);

        document.getElementById('submitBtn').disabled = true;
        document.getElementById('recordStatus').textContent = '⏳ Đang gửi bài...';

        const res = await Api.postForm('/api/student/practice/analyze', fd);
        if (!res.success) { Toast.err(res.message); document.getElementById('submitBtn').disabled = false; return; }

        Toast.ok('Đã nộp! Đang chờ AI chấm điểm...');
        const submissionId = res.data.submissionId;
        startPolling(submissionId);
    }

    function startPolling(submissionId) {
        document.getElementById('resultPanel').style.display = 'block';
        document.getElementById('resultScoreCircle').querySelector('.score-val').textContent = '...';
        document.getElementById('recordStatus').textContent = '⏳ AI đang chấm điểm...';

        pollingInterval = setInterval(async () => {
            const res = await Api.get(`/api/student/submissions/${submissionId}/status`);
            if (!res.success) return;
            const d = res.data;
            if (d.status === 'Evaluated' || d.status === 'Error' || d.status === 'Failed') {
                clearInterval(pollingInterval);
                showResult(d);
            }
        }, 3000);
    }

    function showResult(d) {
        document.getElementById('recordStatus').textContent = 'Đã chấm xong!';
        const sc = scoreStyle(d.overall);
        const circle = document.getElementById('resultScoreCircle');
        circle.style.background = `linear-gradient(135deg,#6366f1,#06b6d4)`;
        circle.querySelector('.score-val').textContent = sc.text;

        const subs = [
            { label: 'Pronunciation', val: d.pronunciation, color: '#6366f1' },
            { label: 'Grammar', val: d.grammar, color: '#818cf8' },
            { label: 'Vocabulary', val: d.lexicalResource, color: '#06b6d4' },
            { label: 'Coherence', val: d.coherence, color: '#6366f1' },
        ];
        document.getElementById('resultSubScores').innerHTML = subs.map(s => `
            <div class="col-6 col-md-3 text-center">
                <div style="font-size:1.5rem;font-weight:800;color:${s.color};">${s.val != null ? s.val.toFixed(1) : '—'}</div>
                <div style="font-size:0.72rem;color:#64748b;">${s.label}</div>
            </div>`).join('');

        if (d.aiFeedback) {
            let fbText = d.aiFeedback;
            try { const fb = JSON.parse(d.aiFeedback); fbText = fb.feedback || fb.Feedback || fbText; } catch {}
            document.getElementById('feedbackText').textContent = fbText;
            document.getElementById('resultFeedback').style.display = 'block';
        }
        Toast.ok('AI đã chấm xong bài của bạn!');
    }

    initStudentPage('practice', async () => {
        const res = await Api.get(`/api/student/practice/topics/${topicId}?part=${part}`);
        if (!res.success || !res.data || res.data.length === 0) {
            Toast.err(res.message || 'Không tải được câu hỏi.');
            return;
        }
        questions = res.data;
        document.getElementById('headerTopicName').textContent = questions[0]?.title?.split(' - ')[0] || `Chủ đề #${topicId}`;
        document.getElementById('headerTitle').textContent = questions[0]?.title?.split(' - ')[0] || `Chủ đề #${topicId}`;
        document.getElementById('headerPartBadge').textContent = part > 0 ? `Part ${part}` : 'Practice';
        document.getElementById('qPartBadge').textContent = part > 0 ? `Part ${part}` : 'Practice';

        document.getElementById('questionList').innerHTML = questions.map((q, i) => `
            <div class="question-list-item${i===0?' active':''}" onclick="jumpTo(${i})">
                <span class="q-num">${i+1}</span>
                <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.8rem;">${q.question}</span>
            </div>`).join('');

        jumpTo(0);
    });
</script>
</body>
</html>
