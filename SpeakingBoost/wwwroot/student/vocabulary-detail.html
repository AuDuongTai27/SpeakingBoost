<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Từ vựng - SpeakingBoost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/admin-layout.css" rel="stylesheet">
    <style>
        .flashcard-container {
            perspective: 1000px;
            height: 350px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 2rem;
            cursor: pointer;
        }
        .flashcard {
            width: 100%; height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .flashcard-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 16px; padding: 2rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center;
        }
        .flashcard-front {
            background: linear-gradient(135deg, #fff 0%, #f8fafc 100%);
            border: 2px solid #e2e8f0;
        }
        .flashcard-back {
            background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
            color: white;
            transform: rotateY(180deg);
        }
        .word-title { font-size: 2.5rem; font-weight: 700; color: #0f172a; margin-bottom: 0.5rem; }
        .word-type { font-size: 1rem; color: #8b5cf6; font-weight: 600; font-style: italic; }
        
        .meaning { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; }
        .example-box {
            background: rgba(255,255,255,0.15);
            padding: 1rem; border-radius: 10px; font-style: italic; font-size: 1.1rem;
            width: 100%;
        }
        .note-box { font-size: 0.9rem; opacity: 0.9; margin-top: 1rem; }

        .controls { display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; }
        .btn-control {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; border: none; background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: #475569;
            transition: all 0.2s;
        }
        .btn-control:hover { transform: scale(1.1); color: #8b5cf6; }
        .btn-control:disabled { opacity: 0.5; cursor: not-allowed; transform: none; color: #94a3b8; }
        
        .progress-indicator { text-align: center; font-weight: 600; color: #64748b; margin-bottom: 1rem; }
    </style>
</head>
<body>

<div id="pageLoader"><div class="logo-spin"><i class="bi bi-mic-fill"></i></div><p>Đang tải...</p></div>
<div id="sidebarPlaceholder"></div>
<div id="topbarPlaceholder"></div>

<main id="main">
    <div class="page-content">
        <div class="d-flex align-items-center mb-4">
            <a href="/student/vocabulary.html" class="btn btn-light rounded-circle me-3" style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;"><i class="bi bi-arrow-left"></i></a>
            <div>
                <h1 class="page-title mb-0" id="topicName">Đang tải...</h1>
                <p class="text-muted mb-0" style="font-size:0.85rem;">Click vào thẻ để lật xem nghĩa</p>
            </div>
        </div>

        <div id="vocabArea" style="display:none;">
            <div class="progress-indicator" id="progressText">1 / 10</div>
            
            <div class="flashcard-container" onclick="toggleCard()">
                <div class="flashcard" id="flashcard">
                    <!-- Front (English) -->
                    <div class="flashcard-face flashcard-front">
                        <div class="word-title" id="wordText">Word</div>
                        <div class="word-type" id="wordNote"></div>
                        <div class="mt-4 text-muted" style="font-size:0.8rem;"><i class="bi bi-arrow-repeat me-1"></i>Click để lật</div>
                    </div>
                    <!-- Back (Vietnamese) -->
                    <div class="flashcard-face flashcard-back">
                        <div class="meaning" id="wordMeaning">Nghĩa của từ</div>
                        <div class="example-box" id="wordExample">"Ví dụ minh họa cho từ này"</div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn-control" id="btnPrev" onclick="prevWord()"><i class="bi bi-chevron-left"></i></button>
                <button class="btn-control" onclick="toggleCard()"><i class="bi bi-arrow-repeat"></i></button>
                <button class="btn-control" id="btnNext" onclick="nextWord()"><i class="bi bi-chevron-right"></i></button>
            </div>
        </div>
        
        <div id="emptyArea" class="text-center py-5" style="display:none;">
            <i class="bi bi-inbox fs-1 text-muted d-block mb-3"></i>
            <p class="text-muted">Không có từ vựng nào trong chủ đề này.</p>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/student.js"></script>
<script>
    initStudentPage('nav-vocab', 'Học Từ vựng');

    let wordsList = [];
    let currentIndex = 0;

    AuthGuard.onReady(async user => {
        const urlParams = new URLSearchParams(window.location.search);
        const topicId = urlParams.get('id');

        if (!topicId) {
            Toast.err('Không tìm thấy mã chủ đề');
            window.location.href = '/student/vocabulary.html';
            return;
        }

        const res = await Api.get(`/api/student/vocabulary/topics/${topicId}`);
        if (res.success && res.data) {
            document.getElementById('topicName').textContent = res.data.topicName;
            const words = res.data.words; // Matches VocabularyDetailsDto
            
            if (words && words.length > 0) {
                wordsList = words;
                document.getElementById('vocabArea').style.display = 'block';
                showWord(0);
            } else {
                document.getElementById('emptyArea').style.display = 'block';
            }
        } else {
            Toast.err(res.message || 'Lỗi tải từ vựng');
            document.getElementById('emptyArea').style.display = 'block';
        }
    });

    function showWord(index) {
        if (index < 0 || index >= wordsList.length) return;
        currentIndex = index;
        
        const w = wordsList[index];
        
        // Reset lật bài
        document.getElementById('flashcard').classList.remove('is-flipped');
        
        setTimeout(() => {
            document.getElementById('wordText').textContent = w.word;
            document.getElementById('wordNote').textContent = ""; // Note is not in WordDto
            document.getElementById('wordMeaning').textContent = w.meaning || 'Chưa có nghĩa';
            
            const exBox = document.getElementById('wordExample');
            if (w.example) {
                exBox.style.display = 'block';
                exBox.textContent = `"${w.example}"`;
            } else {
                exBox.style.display = 'none';
            }

            document.getElementById('progressText').textContent = `${index + 1} / ${wordsList.length}`;
            
            document.getElementById('btnPrev').disabled = (index === 0);
            document.getElementById('btnNext').disabled = (index === wordsList.length - 1);
        }, 150); // Đợi thẻ lật lại mới đổi text để không bị giật
    }

    function toggleCard() {
        document.getElementById('flashcard').classList.toggle('is-flipped');
    }

    function nextWord() {
        if (currentIndex < wordsList.length - 1) showWord(currentIndex + 1);
    }

    function prevWord() {
        if (currentIndex > 0) showWord(currentIndex - 1);
    }
</script>
</body>
</html>
