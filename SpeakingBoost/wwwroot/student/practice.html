<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Speaking - SpeakingBoost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="/css/student-layout.css" rel="stylesheet">
</head>
<body>
<div id="pageLoader" class="page-loader">
    <div class="loader-icon"><i class="bi bi-mic-fill"></i></div>
    <div class="loader-text">Đang tải...</div>
</div>

<div id="navbarPlaceholder"></div>

<!-- ═══ PAGE HEADER ══════════════════════════════════════════════ -->
<section style="background:radial-gradient(circle at center,#635bf8 30%,#1d036a 100%);padding:60px 0;">
    <div class="container text-center">
        <h1 style="font-size:1.6rem;font-weight:800;color:#fff;margin:0;">Luyện Speaking</h1>
        <p style="color:rgba(255,255,255,0.8);font-size:0.875rem;margin:6px 0 0;">Chọn chủ đề và luyện tập tự do với AI thông minh</p>
    </div>
</section>

<!-- ═══ FILTERS + GRID ═══════════════════════════════════════════ -->
<main style="background:#f0f4f8;min-height:calc(100vh - 200px);padding:28px 0;">
    <div class="container">
        <div class="row justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div class="col-auto d-flex align-items-center gap-2">
                <span style="font-size:0.82rem;font-weight:600;color:#64748b;white-space:nowrap;">Lọc theo Part:</span>
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <button class="btn-part active" data-part="0">Tất cả</button>
                    <button class="btn-part" data-part="1">Part 1</button>
                    <button class="btn-part" data-part="2">Part 2</button>
                    <button class="btn-part" data-part="3">Part 3</button>
                </div>
            </div>
            <div class="col-auto" style="max-width:450px;width:100%;">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Tìm chủ đề...">
                </div>
            </div>
        </div>
        <div class="row g-3" id="topicsContainer">
            <div class="col-12 text-center py-5 text-muted">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>Đang tải chủ đề...
            </div>
        </div>
    </div>
</main>

<footer style="background:#1e293b;color:#94a3b8;padding:28px 0;">
    <div class="container">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2" style="font-size:0.78rem;">
            <span>© 2026 SpeakingBoost. All rights reserved.</span>
            <span>Made with <i class="bi bi-heart-fill text-danger"></i> for IELTS Learners</span>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/student.js"></script>
<script>
    let allTopics = [];
    let currentPart = 0;

    async function loadTopics(part) {
        currentPart = part;
        document.getElementById('topicsContainer').innerHTML = `<div class="col-12 text-center py-5 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Đang tải...</div>`;
        const res = await Api.get(`/api/student/practice/topics?part=${part}`);
        if (!res.success) {
            document.getElementById('topicsContainer').innerHTML = `<div class="col-12 text-center py-5 text-muted"><i class="bi bi-exclamation-circle" style="font-size:2.5rem;opacity:0.4;display:block;margin-bottom:0.75rem;"></i><p>${res.message}</p></div>`;
            return;
        }
        allTopics = res.data || [];
        renderTopics();
    }

    function renderTopics() {
        const search = (document.getElementById('searchInput').value || '').toLowerCase();
        const filtered = allTopics.filter(t => !search || t.title.toLowerCase().includes(search));
        const c = document.getElementById('topicsContainer');
        if (!filtered.length) {
            c.innerHTML = `<div class="empty-state"><i class="bi bi-inbox"></i><p>Không có chủ đề nào.</p></div>`;
            return;
        }
        c.innerHTML = filtered.map((t, i) => {
            const st = topicStyle(i);
            const partLabel = currentPart > 0 ? `Part ${currentPart}` : t.forecastLabel || 'Bộ đề';
            const partColors = { '1': ['#ede9fe','#7c3aed'], '2': ['#dcfce7','#16a34a'], '3': ['#e0f2fe','#0284c7'] };
            const [badgeBg, badgeColor] = partColors[String(currentPart)] || ['#f1f5f9','#64748b'];
            return `<div class="col-sm-6 col-md-4 col-xl-3">
                <a href="/student/practice-question.html?topicId=${t.id}&part=${currentPart}" class="topic-card d-block text-decoration-none">
                    <div style="width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:1.3rem;background:${st.bg};color:${st.color};">
                        <i class="bi bi-${st.icon}"></i>
                    </div>
                    <span class="part-badge" style="background:${badgeBg};color:${badgeColor};">${partLabel}</span>
                    <div class="topic-card-title mt-1">${t.title}</div>
                    <div class="topic-card-meta"><i class="bi bi-question-circle me-1"></i>${t.questionCount} câu hỏi</div>
                    <div class="action-arrow mt-3"><i class="bi bi-arrow-right"></i> Bắt đầu</div>
                </a>
            </div>`;
        }).join('');
    }

    document.querySelectorAll('.btn-part').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.btn-part').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            loadTopics(parseInt(this.dataset.part));
        });
    });

    document.getElementById('searchInput').addEventListener('input', renderTopics);

    initStudentPage('practice', () => loadTopics(0));
</script>
</body>
</html>
