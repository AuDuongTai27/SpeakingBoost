<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử nộp bài - SpeakingBoost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="/css/student-layout.css" rel="stylesheet">
</head>
<body>
<div id="pageLoader" class="page-loader">
    <div class="loader-icon"><i class="bi bi-clock-history"></i></div>
    <div class="loader-text">Đang tải...</div>
</div>

<div id="navbarPlaceholder"></div>

<!-- ═══ PAGE HEADER ══════════════════════════════════════════════ -->
<section style="background:radial-gradient(circle at center,#ff6262 30%,#840000 100%);padding:70px 0 90px;text-align:center;">
    <div class="container">
        <h1 style="font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:8px;">Lịch sử nộp bài</h1>
        <p style="color:rgba(255,255,255,0.85);font-size:0.95rem;">Xem lại tất cả bài đã nộp và điểm AI chấm</p>
    </div>
</section>

<!-- ═══ FILTER CARD (floating) ══════════════════════════════════ -->
<section style="margin-top:-70px;position:relative;z-index:10;">
    <div class="container">
        <div class="bg-white rounded-4 shadow-sm" style="max-width:440px;margin:0 auto;padding:20px 30px 16px;">
            <div class="input-group mb-3">
                <input type="text" class="form-control" id="searchInput" placeholder="Tìm theo tên bài tập..." oninput="renderList()">
            </div>
            <div class="filter-tabs d-flex gap-2 flex-wrap justify-content-center">
                <button class="filter-tab active" onclick="switchMode('all',this)">Tất cả</button>
                <button class="filter-tab" onclick="switchMode('practice',this)">Practice</button>
                <button class="filter-tab" onclick="switchMode('deadline',this)">Deadline</button>
            </div>
        </div>
    </div>
</section>

<!-- ═══ HISTORY LIST ═════════════════════════════════════════════ -->
<main style="background:#f0f4f8;padding:32px 0 40px;min-height:calc(100vh - 200px);">
    <div class="container">
        <div class="row" id="historyList">
            <div class="col-12 text-center py-5 text-muted">
                <div class="spinner-border spinner-border-sm me-2"></div>Đang tải...
            </div>
        </div>
    </div>
</main>

<footer style="background:#1e293b;color:#94a3b8;padding:28px 0;">
    <div class="container">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2" style="font-size:0.78rem;">
            <span>© 2026 SpeakingBoost. All rights reserved.</span>
            <span>Made with <i class="bi bi-heart-fill text-danger"></i> for IELTS Learners</span>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/student.js"></script>
<script>
    let allItems = [];
    let currentMode = 'all';

    function switchMode(mode, el) {
        currentMode = mode;
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderList();
    }

    function renderList() {
        const search = (document.getElementById('searchInput').value || '').toLowerCase();
        let items = allItems;
        if (currentMode === 'practice') items = items.filter(i => !i.classExerciseId);
        else if (currentMode === 'deadline') items = items.filter(i => !!i.classExerciseId);
        if (search) items = items.filter(i => i.exerciseTitle.toLowerCase().includes(search));

        const list = document.getElementById('historyList');
        if (!items.length) {
            list.innerHTML = `<div class="col-12 empty-state"><i class="bi bi-inbox"></i><p>Không có bài nộp nào.</p></div>`;
            return;
        }
        list.innerHTML = items.map(item => {
            const sc = scoreStyle(item.overall);
            const isDeadline = !!item.classExerciseId;
            const typeLabel = isDeadline
                ? `<span style="background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:999px;font-size:0.68rem;font-weight:700;">Deadline</span>`
                : `<span style="background:#ede9fe;color:#7c3aed;padding:2px 8px;border-radius:999px;font-size:0.68rem;font-weight:700;">Practice</span>`;
            const statusColor = item.status === 'Evaluated' ? '#16a34a' : item.status === 'Processing' ? '#0284c7' : '#64748b';
            const statusLabel = item.status === 'Evaluated' ? 'Đã chấm' : item.status === 'Processing' ? 'Đang chấm' : item.status;
            return `<div class="col-lg-6 col-md-6 col-12 mb-3">
                <a href="/student/submission-detail.html?id=${item.submissionId}" class="text-decoration-none">
                    <div class="bg-white rounded-4 shadow-sm p-4 h-100 border" style="border-color:#e2e8f0;transition:all 0.2s;">
                        <div class="row align-items-center g-3">
                            <div class="col-auto">
                                <div style="width:42px;height:42px;border-radius:50%;background:#ede9fe;color:#7c3aed;font-size:0.95rem;font-weight:700;display:flex;align-items:center;justify-content:center;">
                                    ${item.attemptNumber}
                                </div>
                            </div>
                            <div class="col flex-grow-1" style="min-width:0;">
                                <div style="font-weight:600;font-size:0.9rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;">
                                    ${typeLabel} ${item.exerciseTitle}
                                </div>
                                <div style="font-size:0.78rem;color:#64748b;">
                                    <i class="bi bi-clock me-1"></i>${fmtDateTime(item.createdAt)}
                                    <span style="margin-left:8px;color:${statusColor};"><i class="bi bi-circle-fill me-1" style="font-size:0.5rem;"></i>${statusLabel}</span>
                                </div>
                            </div>
                            <div class="col-auto text-end">
                                <div style="padding:6px 16px;border-radius:999px;background:${sc.bg};color:${sc.color};font-weight:700;font-size:0.9rem;">${sc.text}</div>
                            </div>
                        </div>
                    </div>
                </a>
            </div>`;
        }).join('');
    }

    initStudentPage('history', async () => {
        const res = await Api.get('/api/student/submissions/all-history');
        if (!res.success) { Toast.err(res.message); return; }
        allItems = res.data || [];
        renderList();
    });
</script>
</body>
</html>
